services:
  - type: web
    name: clinic-booking
    env: php
    buildCommand: composer install --no-dev && php artisan migrate --force && php artisan db:seed --force && php artisan config:cache && php artisan route:cache
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
